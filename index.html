<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/extra.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
 
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="logo">
          <span class="logo-mark">✦</span>
          <span class="logo-text">Questboard</span>
        </div>
      </div>
 
      <div class="sidebar-section">
        <div class="sidebar-label">Quests</div>
        <ul id="project-list" class="project-list"></ul>
        <button class="btn-new-project" id="btn-add-project">
          <span>+</span> New Quest
        </button>
      </div>
 
      <div class="sidebar-bottom">
        <div class="stats">
          <div class="stat">
            <span class="stat-num" id="stats-total">0</span>
            <span class="stat-label">Total</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat">
            <span class="stat-num" id="stats-done">0</span>
            <span class="stat-label">Done</span>
          </div>
        </div>
      </div>
    </aside>
 
    <!-- Main -->
    <main class="main">
      <header class="main-header">
        <h1 id="project-title" class="main-title">Inbox</h1>
        <button class="btn-primary" id="btn-add-todo">+ Post a Quest</button>
      </header>
 
      <div class="todo-container">
        <div id="todo-list" class="todo-list"></div>
      </div>
    </main>
 
    <!-- Detail Panel -->
    <aside id="detail-panel" class="detail-panel"></aside>
 
  </div>
 
  <!-- Modal -->
  <div id="modal" class="modal"></div>
 
  <script type="module" src="src/index.js"></script>
</body>
</html>
